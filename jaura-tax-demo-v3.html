<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JauraTax — Live Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── NAV BAR ── */
    #demo-nav {
      flex-shrink: 0;
      background: #0c0e16;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid #1e2235;
      box-shadow: 0 1px 12px rgba(0,0,0,0.5);
    }

    .demo-logo {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.3px;
      margin-right: 18px;
      white-space: nowrap;
    }
    .demo-logo span { color: #818cf8; }

    .nav-tab {
      background: transparent;
      color: #64748b;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
      white-space: nowrap;
      height: 32px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .nav-tab:hover {
      background: #1e2235;
      color: #cbd5e1;
    }

    .nav-tab.active {
      background: #3730a3;
      color: #fff;
      font-weight: 600;
    }

    .demo-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #475569;
      font-size: 12px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── SCREEN AREA ── */
    #screens-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #171614;
    }

    .screen-panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .screen-panel.active {
      display: block;
    }

    .demo-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div id="demo-nav">
    <div class="demo-logo">Jaura<span>Tax</span></div>

<button class="nav-tab" onclick="showScreen('reminders')" id="tab-reminders">🔔 Reminders</button>
<button class="nav-tab" onclick="showScreen('clients')" id="tab-clients">👥 Clients</button>
<button class="nav-tab" onclick="showScreen('portal')" id="tab-portal">📤 Client Portal</button>

    <div class="demo-badge">
      <div class="live-dot"></div>
      Demo Mode
    </div>
  </div>

function tagHTML(t) {
  if (t === 'sms') return '<span class=&quot;tag tag-sms&quot;>SMS</span>';
  if (t === 'email') return '<span class=&quot;tag tag-email&quot;>Email</span>';
  if (t === 'success') return '<span class=&quot;tag tag-success&quot;>✓ Delivered</span>';
  if (t === 'pending') return '<span class=&quot;tag tag-pending&quot;>⏳ Awaiting reply</span>';
  return '';
}

function renderLog(data) {
  var container = document.getElementById('log-body');
  if (!container) return;
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    var bg = colors[item.initials] || '#01696f';
    var tagsHtml = '';
    for (var j = 0; j < item.tags.length; j++) {
      tagsHtml += tagHTML(item.tags[j]);
    }
    html += '<div class=&quot;log-item&quot; style=&quot;align-items:center&quot;>';
    html += '<div class=&quot;log-avatar&quot; style=&quot;background:' + bg + '&quot;>' + item.initials + '</div>';
    html += '<div class=&quot;log-content&quot;>';
    html += '<div class=&quot;log-top&quot;><span class=&quot;log-name&quot;>' + item.name + '</span><span class=&quot;log-time&quot;>' + item.time + '</span></div>';
    html += '<div class=&quot;log-desc&quot;>' + item.desc + '</div>';
    html += '<div class=&quot;log-tags&quot; style=&quot;margin-top:.375rem&quot;>' + tagsHtml + '</div>';
    html += '</div>';
    html += '<button class=&quot;row-action&quot; style=&quot;flex-shrink:0;margin-left:.75rem;border:1px solid var(--color-border);padding:4px 10px;border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted)&quot; onclick=&quot;openPreview(' + i + ')&quot; data-idx=&quot;' + i + '&quot;>Preview</button>';
    html += '</div>';
  }
  container.innerHTML = html;
  var countEl = document.getElementById('log-count');
  if (countEl) countEl.textContent = data.length + ' events';
  window._currentLog = data;
}

function confirmSend() {
  var modal = document.getElementById('send-modal');
  if (modal) modal.classList.remove('open');

  var pending = (window._currentLog || logData).filter(function(e){ return e.tags.indexOf('pending') !== -1; });
  var newEntries = pending.map(function(e){
    return {
      initials: e.initials,
      name: e.name,
      email: e.email,
      missing: e.missing,
      time: 'Just now',
      desc: 'Reminder sent via Make.com — ' + (e.missing ? e.missing.join(' &amp; ') : 'documents') + ' still missing.',
      tags: ['sms','email','success']
    };
  });
  var current = window._currentLog || logData;
  var updated = newEntries.concat(current);
  renderLog(updated);

  var ts = document.getElementById('total-sent');
  var ss = document.getElementById('sms-sent');
  var es = document.getElementById('email-sent');
  if (ts) { ts.style.opacity='0'; setTimeout(function(){ ts.textContent = parseInt(ts.textContent)+2; ts.style.opacity='1'; }, 200); }
  if (ss) { ss.style.opacity='0'; setTimeout(function(){ ss.textContent = parseInt(ss.textContent)+1; ss.style.opacity='1'; }, 200); }
  if (es) { es.style.opacity='0'; setTimeout(function(){ es.textContent = parseInt(es.textContent)+1; es.style.opacity='1'; }, 200); }

  showToast('Make.com triggered: SMS + Email sent to Raj Patel &amp; David Kim');

}

function openPreview(idx) {
  var data = window._currentLog || [];
  var item = data[idx];
  if (!item) return;

  document.getElementById('preview-modal-title').textContent = item.name + ' — Message Preview';
  document.getElementById('preview-email-to').textContent = item.email || (item.name.toLowerCase().replace(' ','.') + '@email.com');
  document.getElementById('preview-sms-meta').textContent = 'Delivered via Make.com · ' + item.time;

  var firstName = item.name.split(' ')[0];
  var missing = item.missing || ['T4 Slip', 'NOA 2024'];
  var missingStr = missing.join(' &amp; ');
  var slug = firstName.toLowerCase();

  document.getElementById('preview-sms-text').innerHTML =
    'Hi <strong>' + firstName + '</strong>, your accountant <strong>Jaura CPA</strong> needs your <strong>' + missingStr + '</strong> to file your taxes. Upload here: <strong>jaura.tax/upload/' + slug + '</strong> \uD83D\uDD12';

  document.getElementById('preview-email-subject').textContent = 'Action Required: Documents needed for your 2025 tax return';
  document.getElementById('preview-email-body').innerHTML =
    'Hi <strong>' + firstName + '</strong>,<br><br>' +
    'Your accountant <strong>Jaura CPA</strong> at <strong>Jaura Automation</strong> still needs the following documents:<br><br>' +
    missing.map(function(d){ return '· ' + d; }).join('<br>') +
    '<br><br>Please upload them securely — it only takes 2 minutes.';

  document.getElementById('preview-modal').classList.add('open');
}

function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.5&quot; style=&quot;width:16px;height:16px;flex-shrink:0&quot;><polyline points=&quot;20 6 9 17 4 12&quot;/></svg><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('removing');setTimeout(()=>t.remove(),200);},3500);
}

function comingSoon(name) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = 'var(--color-surface)';
  t.style.color = 'var(--color-text)';
  t.style.border = '1px solid var(--color-border)';
  t.innerHTML = `<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; style=&quot;width:15px;height:15px;flex-shrink:0;color:var(--color-primary)&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/><path d=&quot;M12 6v6l4 2&quot;/></svg><span><strong>${name}</strong> — Coming in next release</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('removing');setTimeout(()=>t.remove(),200);},2500);
}

renderLog(logData);

<script>
let fileQueue = [];

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!fileQueue.find(f => f.name === file.name)) {
      fileQueue.push(file);
    }
  });
  renderQueue();
  updateSubmitBtn();
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('dragging');
}
function handleDragLeave(e) {
  document.getElementById('upload-zone').classList.remove('dragging');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('dragging');
  handleFiles(e.dataTransfer.files);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function renderQueue() {
  const container = document.getElementById('file-queue');
  if (!fileQueue.length) { container.innerHTML = ''; return; }
  container.innerHTML = fileQueue.map((f, i) => `
    <div class=&quot;file-item&quot; id=&quot;fq-${i}&quot;>
      <div class=&quot;file-thumb&quot;>
        <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><path d=&quot;M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z&quot;/><polyline points=&quot;14 2 14 8 20 8&quot;/></svg>
      </div>
      <div class=&quot;file-info&quot;>
        <div class=&quot;file-name&quot;>${f.name}</div>
        <div class=&quot;file-size&quot;>${formatSize(f.size || Math.floor(Math.random()*500+100)*1024)}</div>
      </div>
      <button class=&quot;file-remove&quot; onclick=&quot;removeFile(${i})&quot; aria-label=&quot;Remove file&quot;>
        <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><line x1=&quot;18&quot; y1=&quot;6&quot; x2=&quot;6&quot; y2=&quot;18&quot;/><line x1=&quot;6&quot; y1=&quot;6&quot; x2=&quot;18&quot; y2=&quot;18&quot;/></svg>
      </button>
    </div>`).join('');
}

function removeFile(index) {
  fileQueue.splice(index, 1);
  renderQueue();
  updateSubmitBtn();
}

function updateSubmitBtn() {
  document.getElementById('submit-btn').disabled = fileQueue.length === 0;
}

function submitDocs() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; style=&quot;width:18px;height:18px;animation:spin 1s linear infinite&quot;><path d=&quot;M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0&quot;/></svg> Uploading securely...`;

  // Show progress bar
  const pw = document.getElementById('progress-wrap');
  const pb = document.getElementById('progress-bar');
  pw.style.display = 'block';

  let prog = 0;
  const tick = setInterval(() => {
    prog = Math.min(prog + Math.random() * 18 + 8, 95);
    pb.style.width = prog + '%';
  }, 200);

  setTimeout(() => {
    clearInterval(tick);
    pb.style.width = '100%';
    // Mark docs as uploaded
    markDocUploaded('doc-t4', 'doc-t4-status');
    markDocUploaded('doc-noa', 'doc-noa-status');
    setTimeout(showSuccess, 400);
  }, 2200);
}

function markDocUploaded(itemId, statusId) {
  const item = document.getElementById(itemId);
  const status = document.getElementById(statusId);
  if (item) item.classList.add('uploaded');
  if (status) { status.textContent = 'Uploaded ✓'; status.className = 'doc-status done'; }
}

function showSuccess() {
  document.getElementById('main-page').style.display = 'none';
  const s = document.getElementById('success-screen');
  s.style.display = 'flex';
}

function resetDemo() {
  fileQueue = [];
  document.getElementById('main-page').style.display = 'flex';
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('file-queue').innerHTML = '';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').innerHTML = `<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.5&quot; style=&quot;width:18px;height:18px&quot;><polyline points=&quot;20 6 9 17 4 12&quot;/></svg> Submit Documents to Jaura CPA`;
  document.getElementById('doc-t4').classList.remove('uploaded');
  document.getElementById('doc-noa').classList.remove('uploaded');
  document.getElementById('doc-t4-status').textContent = 'Missing'; document.getElementById('doc-t4-status').className = 'doc-status pending';
  document.getElementById('doc-noa-status').textContent = 'Missing'; document.getElementById('doc-noa-status').className = 'doc-status pending';
}

// Spin keyframe
const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);
</script>

<script>
  function showScreen(key) {
    document.querySelectorAll('.screen-panel').forEach(el => {
      el.classList.remove('active');
      el.style.display = 'none';
    });
    document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));

    const panel = document.getElementById('screen-' + key);
    if (panel) { panel.style.display = 'block'; panel.classList.add('active'); }

    const tab = document.getElementById('tab-' + key);
    if (tab) tab.classList.add('active');
  }

  // Keyboard shortcuts: 1-4 to switch screens
  const screenKeys = ['dashboard', 'reminders', 'clients', 'portal'];
  document.addEventListener('keydown', e => {
    const n = parseInt(e.key);
    if (n >= 1 && n <= 4) showScreen(screenKeys[n - 1]);
  });

  showScreen('dashboard');
</script>
